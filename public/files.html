    <!--عداد الزوار-->
    <script>
        (function() {
            // لو المستخدم اتعد قبل كده في نفس الجلسة
            if (!sessionStorage.getItem('counted')) {
                let counter = localStorage.getItem('siteVisitorCount');
                if (!counter || isNaN(counter)) counter = 0;
                counter = parseInt(counter, 10) + 1;
                try {
                    localStorage.setItem('siteVisitorCount', counter);        
                    localStorage.setItem('siteVisitorCount', counter);
                    sessionStorage.setItem('counted', 'true'); // علامة إننا حسبناه
                } catch (e) {}
            }
            // عرض العداد
            var el = document.getElementById('visitor-counter');
            if (el) {
                el.textContent = 'انت الزائر رقم ' + localStorage.getItem('siteVisitorCount');
            }
        })();
    </script>

  <!-- سكربت تحميل الملفات من لوحة التحكم -->
  <script>
    function loadFilesData() {
        const filesData = localStorage.getItem('filesData');
        const tbody = document.getElementById('files-tbody');
        
        if (!tbody) return;

        if (!filesData) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">لا توجد ملفات متاحة</td></tr>';
            return;
        }

        const files = JSON.parse(filesData);
        if (files.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">لا توجد ملفات متاحة</td></tr>';
            return;
        }

        let html = '';
        files.forEach((file, index) => {
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${file.name}</td>
                    <td>${file.description}</td>
                    <td><a href="${file.link}" target="_blank" class="table-btn">تحميل الملف</a></td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadFilesData);
  </script>
