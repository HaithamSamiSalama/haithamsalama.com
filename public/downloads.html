    <!--عداد الزوار-->
    <script>
        (function() {
            // لو المستخدم اتعد قبل كده في نفس الجلسة
            if (!sessionStorage.getItem('counted')) {
                let counter = localStorage.getItem('siteVisitorCount');
                if (!counter || isNaN(counter)) counter = 0;
                counter = parseInt(counter, 10) + 1;
                try {
                    localStorage.setItem('siteVisitorCount', counter);        
                    localStorage.setItem('siteVisitorCount', counter);
                    sessionStorage.setItem('counted', 'true'); // علامة إننا حسبناه
                } catch (e) {}
            }
            // عرض العداد
            var el = document.getElementById('visitor-counter');
            if (el) {
                el.textContent = 'انت الزائر رقم ' + localStorage.getItem('siteVisitorCount');
            }
        })();
    </script>
    
    <!-- سكربت تحميل البرامج من لوحة التحكم -->
    <script>
        function loadProgramsData() {
            const programsData = localStorage.getItem('programsData');
            const container = document.getElementById('programs-container');
            
            if (!container) return;

            if (!programsData) {
                container.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">لا توجد برامج متاحة حالياً</p>';
                return;
            }

            const programs = JSON.parse(programsData);
            if (programs.length === 0) {
                container.innerHTML = '<p style="padding: 20px; text-align: center; color: #999;">لا توجد برامج متاحة حالياً</p>';
                return;
            }

            let html = '';
            programs.forEach((program, index) => {
                html += `
                    <div class="program-frame">
                        <div class="program-content image-box">
                            ${program.image ? 
                                `<img src="${program.image}" alt="${program.nameAr}" class="program-image">` :
                                `<img src="images/placeholder.png" alt="${program.nameAr}" class="program-image">`
                            }
                        </div>

                        <div class="program-content text-box">
                            <div class="titles">
                                <h3>${program.nameAr}</h3>
                                <h2>${program.nameEn}</h2>
                            </div>

                            <div class="description">
                                <p>${program.description}</p>
                            </div>

                            <div class="buttons">
                                <a href="${program.videoLink}" target="_blank" class="btn btn-blue">
                                    مشاهدة الفيديو التوضيحي - يوتيوب
                                </a>

                                <a href="${program.downloadLink}" target="_blank" class="btn btn-purple">
                                    تحميل الآن - Download Now
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadProgramsData);
    </script>
